<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veeqo Chargeback Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <h1>Veeqo Chargeback Tool</h1>
    <div id="header-inputs">
      <input type="text" id="agent-name" placeholder="Your Name" aria-label="Agent Name">
      <input type="text" id="intercom-ticket" placeholder="Intercom Ticket #" aria-label="Intercom Ticket Number">
      <input type="text" id="datanet-profile-url" placeholder="Paste your Datanet profile edit URL here" aria-label="Datanet Profile URL">
    </div>
  </header>

  <!-- Seller Details Panel (always visible, populated on load) -->
  <section id="seller-details-panel">
    <span><strong>Company:</strong> <span id="seller-company-name">Loading...</span> (ID: <span id="seller-company-id">...</span>)</span>
    <span><strong>MCID:</strong> <span id="seller-mcid">...</span></span>
    <span><strong>Marketplace:</strong> <span id="seller-marketplace">...</span></span>
  </section>

  <!-- Single Input Flow -->
  <section id="combined-flow">
    <div class="flow-input-box">
      <textarea id="order-tracking-input" placeholder="Paste order numbers or tracking numbers (one per line, comma, or space separated)" aria-label="Order numbers or tracking numbers" rows="4"></textarea>
      <div class="flow-input-controls">
        <input type="text" id="metabase-company-id" placeholder="Company ID" aria-label="Company ID">
        <button id="fetch-all-btn" class="btn-primary">Fetch &amp; Analyse</button>
      </div>
    </div>

    <!-- Progress Panel (hidden until fetch starts) -->
    <div id="flow-progress" class="flow-progress" style="display:none;">
      <div id="flow-progress-steps"></div>
      <div id="flow-progress-summary" class="flow-progress-summary"></div>
    </div>

    <!-- Fallback options (collapsed) -->
    <details class="manual-fallback-section">
      <summary>Manual options</summary>
      <div class="manual-fallback-grid">
        <div class="manual-option">
          <label>Upload Task Engine CSV</label>
          <input type="file" id="task-engine-file" accept=".csv,.xlsx">
        </div>
        <div class="manual-option">
          <label>Upload Datanet CSV</label>
          <input type="file" id="datanet-file" accept=".csv,.xlsx">
        </div>
        <div class="manual-option">
          <button id="copy-datanet-sql-btn" style="display:none;">Copy Datanet SQL</button>
          <button id="fetch-datanet-btn" style="display:none;">Fetch Datanet Only</button>
        </div>
      </div>
      <p class="upload-filename" id="task-engine-filename"></p>
      <p class="upload-error" id="task-engine-error"></p>
      <p class="upload-filename" id="datanet-filename"></p>
      <p class="upload-error" id="datanet-error"></p>
      <p id="datanet-status" class="datanet-status"></p>
    </details>

    <!-- Error display -->
    <p class="upload-error" id="seller-data-error"></p>
    <p class="upload-filename" id="seller-data-filename"></p>
  </section>

  <!-- Turing Quick Lookup -->
  <section id="turing-lookup-section">
    <label>Quick Lookup (Turing)</label>
    <div class="turing-input-row">
      <textarea id="turing-tracking-input" placeholder="Enter tracking numbers (comma or newline separated)" aria-label="Tracking numbers for Turing lookup" rows="1"></textarea>
      <button id="turing-add-btn">Add</button>
    </div>
    <p id="turing-status" class="turing-status"></p>
    <p id="turing-error" class="upload-error"></p>
  </section>

  <!-- Datanet SQL + Merge Section -->
  <section id="merge-section">
  </section>

  <!-- Action Buttons Bar (hidden until merge completes) -->
  <section id="action-buttons" style="display: none;">
    <div class="action-group">
      <span class="action-group-label">Seller Reply</span>
      <button id="generate-reply-btn" class="btn-action btn-primary-action">Generate Reply</button>
      <button id="export-seller-csv-btn" class="btn-action">Export Breakdown CSV</button>
      <button id="copy-for-ai-btn" class="btn-action">Copy for AI</button>
    </div>
    <div class="action-group">
      <span class="action-group-label">Dispute</span>
      <button id="send-fedex-email-btn" class="btn-action">FedEx Email</button>
      <button id="create-dispute-tcorp-btn" class="btn-action">Dispute T.Corp</button>
      <button id="export-dispute-csv-btn" class="btn-action">Dispute CSV</button>
    </div>
    <div class="action-group">
      <span class="action-group-label">SPLAT</span>
      <button id="create-splat-tcorp-btn" class="btn-action">SPLAT T.Corp</button>
      <button id="export-splat-csv-btn" class="btn-action">SPLAT CSV</button>
    </div>
    <div class="action-group">
      <span class="action-group-label">Analysis</span>
      <button id="generate-summary-btn" class="btn-action">Full Summary</button>
    </div>
  </section>

  <!-- Tab Bar -->
  <nav id="tab-bar">
    <button class="tab" data-tab="FedEx">FedEx</button>
    <button class="tab" data-tab="UPS">UPS</button>
    <button class="tab" data-tab="USPS">USPS</button>
    <button class="tab" data-tab="DHL">DHL</button>
    <button class="tab" data-tab="OnTrac">OnTrac</button>
    <button class="tab" data-tab="Unmatched">Unmatched</button>
    <button class="tab" data-tab="All">All</button>
  </nav>

  <!-- Row Count -->
  <p id="row-count"></p>

  <!-- Scrollable Table Container -->
  <section id="table-container">
    <table id="data-table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- T.Corp Modal -->
  <div id="tcorp-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h2>Create T.Corp</h2>
      <p class="modal-note">Order IDs, Tracking IDs, and shipment details are in the attached CSV. Click "Export Selected as CSV" to generate the attachment.</p>
      <div class="modal-form">
        <label>Seller ID (MCID):<input type="text" id="tcorp-mcid" placeholder="MCID"></label>
        <label>Company ID:<input type="text" id="tcorp-company-id" placeholder="Company ID"></label>
        <label>Veeqo Ticket ID:<input type="text" id="tcorp-ticket-id" placeholder="Intercom ticket number"></label>
        <label>Seller Display Name:<input type="text" id="tcorp-seller-name" placeholder="Seller name"></label>
        <label>Carrier Name:<input type="text" id="tcorp-carrier" placeholder="Carrier"></label>
        <label>Marketplace:<input type="text" id="tcorp-marketplace" placeholder="Marketplace ID"></label>
        <label>Return/Outbound:
          <select id="tcorp-return-outbound">
            <option value="Outbound">Outbound</option>
            <option value="Return">Return</option>
          </select>
        </label>
        <label>Ship date:<input type="text" id="tcorp-ship-date" readonly></label>
        <label>Amount for dispute:<input type="text" id="tcorp-amount" readonly></label>
        <label>Seller Support:<input type="text" id="tcorp-seller-support" value="Carrier Chargebacks SOP v2.0"></label>
        <label>Seller Issue Summary:<textarea id="tcorp-issue-summary" rows="3" placeholder="Describe the seller's issue"></textarea></label>
        <label>Seller Action:<textarea id="tcorp-seller-action" rows="3" placeholder="Describe the action taken"></textarea></label>
      </div>
      <div class="modal-buttons">
        <button id="tcorp-open-btn">Open T.Corp & Auto-fill</button>
        <button id="tcorp-copy-btn">Copy All Fields</button>
        <button id="tcorp-export-splat-btn" style="display:none;">Export SPLAT CSV</button>
        <button id="tcorp-close-btn" class="modal-close-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Notification Area -->
  <div id="notification-area"></div>

  <!-- Scripts -->
  <script src="libs/xlsx.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
